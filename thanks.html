<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received | DM Imprints</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --black: #0a0a0a; --white: #f5f5f5; --accent: #C9A96E; --mid: #888; }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white);
           min-height: 100vh; display: flex; flex-direction: column; align-items: center;
           justify-content: center; text-align: center; padding: 2rem; }
    .tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 9vw, 6rem); line-height: 0.95; letter-spacing: 0.02em; }
    p { margin-top: 1.5rem; color: var(--mid); max-width: 460px; line-height: 1.8; font-weight: 300; }
    a.back { margin-top: 2.5rem; display: inline-flex; align-items: center; gap: 0.7rem;
             background: var(--accent); color: var(--black); text-decoration: none;
             padding: 0.95rem 2rem; font-size: 0.78rem; font-weight: 600;
             letter-spacing: 0.14em; text-transform: uppercase; transition: 0.25s; }
    a.back:hover { background: #a8863d; transform: translateY(-2px); }
    .logo { position: fixed; top: 1.6rem; left: 3rem; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem; letter-spacing: 0.12em; text-decoration: none; color: var(--white); }
    .logo span { color: var(--accent); }
    @media (max-width: 700px) { .logo { left: 1.5rem; } }
  </style>
</head>
<body>
  <a class="logo" href="index.html"><span>DM</span> IMPRINTS</a>
  <div class="tag">Request Received</div>
  <h1>THANK<br />YOU.</h1>
  <p>Your booking request is in. I'll get back to you within 24 hours to confirm the details and talk through what you have in mind.</p>
  <a class="back" href="index.html">← Back to Site</a>
</body>
</html>
